<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploader File Gofile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .upload-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: block;
            background-color: #2ecc71;
            color: white;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.3s;
        }
        .file-label:hover {
            background-color: #27ae60;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            word-break: break-all;
        }
        .success-link {
            color: #2ecc71;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>Gofile Uploader</h2>
    
    <label for="fileInput" class="file-label" id="labelText">Pilih File</label>
    <input type="file" id="fileInput">
    
    <button id="uploadBtn" onclick="uploadFile()">Unggah ke Gofile</button>
    
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const labelText = document.getElementById('labelText');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusDiv = document.getElementById('status');

    // Menampilkan nama file yang dipilih pada label
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            labelText.innerText = fileInput.files[0].name;
        } else {
            labelText.innerText = "Pilih File";
        }
    });

    async function uploadFile() {
        const file = fileInput.files[0];
        if (!file) {
            statusDiv.innerHTML = "<span style='color: red;'>Silakan pilih file terlebih dahulu!</span>";
            return;
        }

        // Reset status dan disable tombol saat proses berlangsung
        statusDiv.innerText = "Mendapatkan server terbaik...";
        uploadBtn.disabled = true;

        try {
            // Langkah 1: Dapatkan server Gofile yang tersedia
            const serverResponse = await fetch('https://api.gofile.io/contents/getServer');
            const serverData = await serverResponse.json();

            if (serverData.status !== 'ok') {
                throw new Error('Gagal mendapatkan server Gofile.');
            }

            const serverName = serverData.data.server;
            statusDiv.innerText = `Mengunggah ke server ${serverName}...`;

            // Langkah 2: Buat Form Data untuk mengirim file
            const formData = new FormData();
            formData.append('file', file);

            // Langkah 3: Kirim file ke server yang didapatkan tadi
            const uploadResponse = await fetch(`https://${serverName}.gofile.io/contents/uploadfile`, {
                method: 'POST',
                body: formData
            });

            const uploadData = await uploadResponse.json();

            if (uploadData.status === 'ok') {
                // Berhasil diunggah
                const downloadPage = uploadData.data.downloadPage;
                statusDiv.innerHTML = `
                    <span style="color: green;">✔ Berhasil Diunggah!</span><br><br>
                    <a href="${downloadPage}" target="_blank" class="success-link">Buka Link Download</a>
                `;
            } else {
                throw new Error('Gagal memproses unggahan dari Gofile.');
            }

        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `<span style='color: red;'>Terjadi kesalahan: ${error.message}</span>`;
        } finally {
            // Aktifkan kembali tombol setelah selesai
            uploadBtn.disabled = false;
        }
    }
</script>

</body>
</html>
