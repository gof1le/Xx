<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Download Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-height-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-folder-open text-amber-500 text-2xl"></i>
            <span class="text-xl font-bold tracking-wide text-white">Go<span class="text-amber-500">file</span></span>
        </div>
        <div class="text-sm text-gray-400">
            Storage ID: <span class="font-mono text-gray-200">srv-94b2</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        
        <div class="bg-gray-800 rounded-xl p-6 mb-6 border border-gray-700 shadow-lg">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-white mb-1">Daftar File Unduhan</h1>
                    <p class="text-sm text-gray-400">Folder ID: <span class="font-mono text-amber-400">d7XyZ92L</span> • Total: 3 File</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="alert('Fitur download semua menyusul')" class="bg-amber-500 hover:bg-amber-600 text-gray-900 font-semibold px-4 py-2 rounded-lg text-sm transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-download"></i> Download Semua (.zip)
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-750 border-b border-gray-700 text-gray-400 text-xs uppercase tracking-wider">
                            <th class="px-6 py-4 font-semibold">Nama File</th>
                            <th class="px-6 py-4 font-semibold">Ukuran</th>
                            <th class="px-6 py-4 font-semibold text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-700">
                        
                        <tr class="hover:bg-gray-750/50 transition-colors">
                            <td class="px-6 py-4 flex items-center space-x-3">
                                <i class="fa-regular fa-file-video text-blue-400 text-xl"></i>
                                <span class="font-medium text-gray-200 truncate max-w-xs md:max-w-md">Liburan_Bali_2026.mp4</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-400 font-mono">1.2 GB</td>
                            <td class="px-6 py-4 text-right">
                                <div class="inline-flex space-x-2">
                                    <button onclick="copyLink('https://gofile.io/d/example1')" class="p-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-gray-300 hover:text-white transition-colors" title="Salin Tautan">
                                        <i class="fa-regular fa-copy"></i>
                                    </button>
                                    <a href="#" class="px-3 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors inline-flex items-center gap-1">
                                        <i class="fa-solid fa-arrow-down"></i> Download
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr class="hover:bg-gray-750/50 transition-colors">
                            <td class="px-6 py-4 flex items-center space-x-3">
                                <i class="fa-regular fa-file-zipper text-amber-400 text-xl"></i>
                                <span class="font-medium text-gray-200 truncate max-w-xs md:max-w-md">Project_Web_Design.zip</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-400 font-mono">45.8 MB</td>
                            <td class="px-6 py-4 text-right">
                                <div class="inline-flex space-x-2">
                                    <button onclick="copyLink('https://gofile.io/d/example2')" class="p-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-gray-300 hover:text-white transition-colors" title="Salin Tautan">
                                        <i class="fa-regular fa-copy"></i>
                                    </button>
                                    <a href="#" class="px-3 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors inline-flex items-center gap-1">
                                        <i class="fa-solid fa-arrow-down"></i> Download
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr class="hover:bg-gray-750/50 transition-colors">
                            <td class="px-6 py-4 flex items-center space-x-3">
                                <i class="fa-regular fa-file-image text-purple-400 text-xl"></i>
                                <span class="font-medium text-gray-200 truncate max-w-xs md:max-w-md">Foto_Profil_HD.png</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-400 font-mono">4.2 MB</td>
                            <td class="px-6 py-4 text-right">
                                <div class="inline-flex space-x-2">
                                    <button onclick="copyLink('https://gofile.io/d/example3')" class="p-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-gray-300 hover:text-white transition-colors" title="Salin Tautan">
                                        <i class="fa-regular fa-copy"></i>
                                    </button>
                                    <a href="#" class="px-3 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors inline-flex items-center gap-1">
                                        <i class="fa-solid fa-arrow-down"></i> Download
                                    </a>
                                </div>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
        
    </main>

    <footer class="mt-12 border-t border-gray-800 py-6 text-center text-sm text-gray-500">
        <p>&copy; 2026 Gofile Clone. Dibuat untuk keperluan template.</p>
    </footer>

    <script>
        function copyLink(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Tautan berhasil disalin ke clipboard!');
            }).catch(err => {
                console.error('Gagal menyalin teks: ', err);
            });
        }
    </script>
</body>
</html>
