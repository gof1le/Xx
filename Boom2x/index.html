<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi File Sharing</title>
    <style>
        /* Gaya Dasar / Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            padding: 15px;
        }

        /* Header / Navbar Atas */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 5px;
            border-bottom: 1px solid #23273a;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #f1c40f; /* Warna bintang/logo */
        }

        /* Banner Iklan / Pengumuman */
        .banner-placeholder {
            width: 100%;
            background: linear-gradient(45deg, #d32f2f, #f44336);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Bilah Pencarian / Kontrol */
        .controls-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2c314c;
            background-color: #1a1d2e;
            color: white;
        }

        .btn {
            background-color: #1a1d2e;
            color: white;
            border: 1px solid #2c314c;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Kontainer Utama File */
        .file-container {
            background-color: #141724;
            border: 1px solid #23273a;
            border-radius: 8px;
            padding: 15px;
        }

        .file-info-header {
            font-size: 0.9rem;
            color: #8b949e;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* Item File */
        .file-item {
            border-bottom: 1px solid #23273a;
            padding: 15px 0;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .file-title {
            font-weight: bold;
            color: #58a6ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-details {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 4px;
        }

        /* Area Pemutar Video / Thumbnail */
        .video-preview {
            width: 100%;
            max-width: 200px;
            aspect-ratio: 9 / 16;
            background-color: #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #2c314c;
        }

        /* Tombol Play Tiruan */
        .play-button {
            width: 50px;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .play-button::after {
            content: "";
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 15px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>★ Shared Storage</h1>
        <div>Menu ☰</div>
    </div>

    <div class="banner-placeholder">
        [ AREA BANNER PROMOSI / IKLAN ]
    </div>

    <div class="controls-bar">
        <button class="btn">↕</button>
        <input type="text" class="search-input" placeholder="Cari file...">
        <button class="btn">🔄</button>
    </div>

    <div class="file-container">
        <div class="file-info-header">
            <span>Menampilkan 2 dari 2 item</span>
            <span>Halaman 1 dari 1</span>
        </div>

        <div class="file-item">
            <div class="file-meta">
                <div>
                    <div class="file-title">📁 1-e (1) (1).mp4</div>
                    <div class="file-details">06/25/2026, 07:33 | 3.9 MB</div>
                </div>
                <div>
                    <button class="btn">⬇ Download</button>
                </div>
            </div>
            <div class="video-preview">
                <div class="play-button"></div>
            </div>
        </div>

        <div class="file-item">
            <div class="file-meta">
                <div>
                    <div class="file-title">📁 187.2 (1).mov</div>
                    <div class="file-details">06/25/2026, 07:33 | 6.3 MB</div>
                </div>
                <div>
                    <button class="btn">⬇ Download</button>
                </div>
            </div>
            <div class="video-preview">
                <div class="play-button"></div>
            </div>
        </div>
    </div>

</body>
</html>
